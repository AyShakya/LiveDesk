services:
  nginx:
    build: 
      context: .
      dockerfile: nginx/Dockerfile
    container_name: livedesk_nginx
    ports:
      - "80:80"
    depends_on:
    - backend
  backend:
    build: ./backend
    container_name: livedesk_backend
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    
  postgres:
    image: postgres:15
    container_name: livedesk_postgres
    environment:
      POSTGRES_DB: livedesk
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: livedesk_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
    external: true
    name: backend_pgdata
